<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎛️ Custom UI | Double-Range Slider & Product Filter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-cont">
      <div class="shop-head">
        <h1 class="">🎯 Filter Runtime</h1>
        <p>High-performance product filtering · double-range slider · debounced search</p>
      </div>


      <div class="error-cont" id="errorAlert">
        <span id="errorMessage">Api called faild.</span>
        <button id="retryBtn" class="retry-btn">Retry Fetch</button>
      </div>


      <div class="filter-card">
        <div class="search-wrapper">
          <div class="search-label">
            <span>🔍 <span>Search products</span></span>
          </div>

          <input
            type="text"
            id="searchInput"
            placeholder="e.g., Headphones, Wireless, Moniter..."
          />
        </div>

        <div class="price-range-sec">
          <div class="price-titel">
            <span>💰 Price range (₹)</span>
            <span class="price-values" id="priceRangeLebal">₹0 — ₹0</span>
          </div>

          <div class="slider-cont" id="sliderContainer">
            <div class="slider-track" id="sliderTrack"></div>
            <input
              type="range"
              id="minSlider"
              min="0"
              max="20000"
              step="50"
              value="0"
            />

            <input
              type="range"
              id="maxSlider"
              min="0"
              max="20000"
              step="50"
              value="20000"
            />
          </div>
        </div>

        <div class="category-wrapper">
          <div class="cat-label">📂 Filter by category</div>
          <div class="category-buttons" id="categoryContainer"></div>
        </div>

        <div class="reset-filters">
          <button class="reset-btn" id="resetFilterBtn">
            ⟳ Reset all fliters
          </button>
        </div>
      </div>

      <div class="stats">
        <div class="result-count" id="resultCount">0 products</div>
        <div style="font-size: 0.75rem; color: #6a8aaa">
          ✨ Realtime filtering
        </div>
      </div>


      <!-- async loader -->
      <div id="loadingError" class="error-loader"> Loading Product Database...  Please wait...</div>

      <div class="product-grid" id="productGrid">
       
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
