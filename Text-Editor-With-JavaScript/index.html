<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/Text-Editor-With-JavaScript/style.css">
</head>

<body>

    <div class="container">
        <div class="tool-Baar">
            <button id="bold" class="option-btn format">
                <i class="fa-solid fa-bold"></i>
            </button>

            <button id="italic" class="option-btn format">
                <i class="fa-solid fa-italic"></i>
            </button>

            <button id="underline" class="option-btn format">
                <i class="fa-solid fa-underline"></i>
            </button>

            <button id="strikethrough" class="option-btn format">
                <i class="fa-solid fa-strikethrough"></i>
            </button>

            <button id="superscript" class="option-btn script">
                <i class="fa-solid fa-superscript"></i>
            </button>

            <button id="subscript" class="option-btn script">
                <i class="fa-solid fa-subscript"></i>
            </button>

            <button id="insertOrderedList" class="option-btn">
                <i class="fa-solid fa-list-ol"></i>
            </button>

            <button id="insertUnorderedList" class="option-btn">
                <i class="fa-solid fa-list"></i>
            </button>

            <button id="undo" class="option-btn">
                <i class="fa-solid fa-rotate-left"></i>
            </button>

            <button id="redo" class="option-btn">
                <i class="fa-solid fa-rotate-right"></i>
            </button>

            <button id="createLink" class="adv-option-btn">
                <i class="fa-solid fa-link"></i>
            </button>

            <button id="unLink" class="option-btn">
                <i class="fa-solid fa-unlink"></i>
            </button>

            <button id="justifyLeft" class="option-btn align">
                <i class="fa-solid fa-align-left"></i>
            </button>

            <button id="justifyCenter" class="option-btn align">
                <i class="fa-solid fa-align-center"></i>
            </button>

            <button id="justifyRight" class="option-btn align">
                <i class="fa-solid fa-align-right"></i>
            </button>

            <button id="justifyFull" class="option-btn align">
                <i class="fa-solid fa-align-justify"></i>
            </button>

            <button id="indent" class="option-btn spacing">
                <i class="fa-solid fa-indent"></i>
            </button>

            <button id="outdent" class="option-btn spacing">
                <i class="fa-solid fa-outdent"></i>
            </button>

            <select name="" id="formatBlock" class="adv-option-btn">
                <option value="H1">H1</option>
                <option value="H2">H2</option>
                <option value="H3">H3</option>
                <option value="H4">H4</option>
                <option value="H5">H5</option>
                <option value="H6">H6</option>
            </select>

            <select id="fontName" class="adv-option-btn"></select>
            <select id="fontSize" class="adv-option-btn"></select>

            <div class="input-wrapper">
                <input type="color" id="foreColor" class="adv-option-btn">
                <label for="foreColor">Font Color</label>
            </div>

            <div class="input-wrapper">
                <input type="color" id="backColor" class="adv-option-btn">
                <label for="backColor">Highlight Color</label>
            </div>
        </div>

        <div id="text-input" contenteditable="true"></div>
    </div>


    <script src="/Text-Editor-With-JavaScript/script.js"></script>
</body>

</html>
